name: Tests

on: [push, pull_request]

env:
  REQUIRED_PHP_EXTENSIONS: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        php: ['8.5', '8.4', '8.3', '8.2']
        stability: [prefer-lowest, prefer-stable]

    name: Test on P${{ matrix.php }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.REQUIRED_PHP_EXTENSIONS }}
          coverage: none

      - name: "Cache composer dependencies"
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: php-${{ matrix.php }}-composer-${{ matrix.os }}-${{ matrix.stability }}

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/pest

  benchmarks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.5', '8.4', '8.3', '8.2']

    name: Benchmark on P${{ matrix.php }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.REQUIRED_PHP_EXTENSIONS }}
          coverage: none

      - name: "Cache composer dependencies"
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: php-${{ matrix.php }}-composer

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction

      - name: Run benchmarks
        if: ${{ ! contains(fromJSON('["8.4", "8.5"]'), matrix.php) }}
        run: 'vendor/bin/phpbench run --report=aggregate --php-config="opcache.enable: 1, opcache.enable_cli: 1"'

      # PHP 8.4/8.5 on CI segfault in the VarExporter cache benchmark with OPcache enabled.
      # Keep the rest of the benchmark suite running while older PHP jobs cover that subject.
      - name: Run benchmarks without VarExporter cache
        if: ${{ contains(fromJSON('["8.4", "8.5"]'), matrix.php) }}
        run: |
          vendor/bin/phpbench run \
            --filter='^(?!.*::benchVarExporter$).*' \
            --report=aggregate \
            --php-config="opcache.enable: 1, opcache.enable_cli: 1"
